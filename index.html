<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form onsubmit="convert(); return false;">
        <h1>Temperature Conversion</h1>

        <input type="number" id="textBox" placeholder="Enter temperature"><br><br>

        <input type="radio" id="toFahrenheit" name="unit">
        <label for="toFahrenheit">Celsius → Fahrenheit</label><br>

        <input type="radio" id="toCelsius" name="unit">
        <label for="toCelsius">Fahrenheit → Celsius</label><br><br>

        <button type="submit">Convert</button>

        <p id="result">Select a unit</p>
    </form>

    <script src="index.js"></script>
</body>
</html>
